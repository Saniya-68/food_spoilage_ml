<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Food Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container auth-container">
        <div class="glass-card text-center">
            <h2 class="mb-4 fw-bold">Create Account</h2>
            <p class="text-secondary mb-4">Join AI Food Tracker to minimize food waste.</p>
            <form action="/register" method="POST">
                <div class="mb-3 text-start">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" name="username" class="form-control form-control-lg" required>
                </div>
                <div class="mb-3 text-start">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" name="email" class="form-control form-control-lg" required>
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control form-control-lg" required>
                </div>
                <button type="submit" class="btn btn-custom w-100 btn-lg mb-3">Register</button>
            </form>
            <p class="text-secondary">Already have an account? <a href="/login" class="text-decoration-none fw-semibold" style="color: var(--primary-color)">Login here</a></p>
        </div>
    </div>
</body>
</html>
