<!DOCTYPE html>
<html>
<head>
    <title>Food Expiry Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2 class="text-center text-success">Smart Food Expiry Tracker</h2>
<a href="/add" class="btn btn-primary mb-3">Add Item</a>

<table class="table table-bordered">
    <tr>
        <th>Name</th>
        <th>Expiry Date</th>
        <th>Storage</th>
        <th>Status</th>
    </tr>

    {% for item in items %}
    <tr>
        <td>{{ item[1] }}</td>
        <td>{{ item[2] }}</td>
        <td>{{ item[3] }}</td>
        <td>{{ item[4] }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
