<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Item - AI Food Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">
                <i class="bi bi-robot text-primary"></i> 
                <span class="gradient-text">AI Food Tracker</span>
            </a>
            <div>
                <a href="/" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                    <i class="bi bi-arrow-left"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </nav>
    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <!-- Flash Messages -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} alert-dismissible fade show shadow-sm" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}
                <div class="glass-card form-container-hero">
                    <div class="text-center mb-4">
                        <div class="icon-circle mb-3 mx-auto bg-primary bg-opacity-10 text-primary" style="width:60px; height:60px; line-height:60px; border-radius:50%">
                            <i class="bi bi-pencil-square fs-3"></i>
                        </div>
                        <h3 class="fw-bold">Update Grocery Item</h3>
                        <p class="text-secondary">Keep your inventory up to date for accurate AI predictions.</p>
                    </div>
                    
                    <form method="POST">
                        <div class="mb-3"><label class="form-label">Item Name</label><input class="form-control" name="name" value="{{ item.name }}" required></div>
                        <div class="mb-3"><label class="form-label">Food Type</label><input class="form-control" name="food_type" value="{{ item.food_type }}" required></div>
                        <div class="mb-3"><label class="form-label">Storage Type</label><select class="form-select" name="storage"><option value="Fridge" {% if item.storage_type == 'Fridge' %}selected{% endif %}>Fridge</option><option value="Room" {% if item.storage_type == 'Room' %}selected{% endif %}>Room</option></select></div>
                        <div class="mb-3"><label class="form-label">Purchase Date</label><input type="date" name="purchase_date" class="form-control" value="{{ item.purchase_date }}" required></div>
                        <div class="mb-3"><label class="form-label">Temperature</label><input type="number" step="0.1" name="temperature" class="form-control" value="{{ item.temperature }}" required></div>
                        <div class="mb-3"><label class="form-label">Humidity</label><input type="number" step="0.1" name="humidity" class="form-control" value="{{ item.humidity }}" required></div>
                        <button type="submit" class="btn btn-custom w-100 btn-lg shadow-sm mt-3"><i class="bi bi-arrow-repeat me-2"></i>Update Prediction</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
