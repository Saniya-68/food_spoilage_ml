<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Food Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="page-bg">
    <div class="login-wrap d-flex align-items-center justify-content-center min-vh-100">
        <div class="login-card glass-card p-4 shadow-lg">
            <div class="d-flex justify-content-between align-items-start mb-3">
                <div>
                    <div class="d-flex align-items-center gap-2 mb-2">
                        <div class="bg-primary px-3 py-1 rounded text-white fw-semibold">Smart Kitchen</div>
                        <span class="badge bg-success">Beta</span>
                    </div>
                    <h2 class="fw-bold">AI Food Spoilage System</h2>
                    <p class="text-secondary">Login to track food, predict expiry, and get recipe suggestions.</p>
                </div>
                <button id="themeToggle" class="btn btn-sm btn-outline-secondary">🌙</button>
            </div>
            <form action="/login" method="POST">
                <div class="mb-3 text-start">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" name="username" class="form-control form-control-lg" required>
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control form-control-lg" required>
                </div>
                <button type="submit" class="btn btn-custom w-100 btn-lg mb-3">Login</button>
            </form>
            <p class="text-secondary">Don't have an account? <a href="/register" class="text-decoration-none fw-semibold" style="color: var(--primary-color)">Register here</a></p>
        </div>
    </div>
    <script>
        const themeToggle = document.getElementById('themeToggle');
        themeToggle?.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            if (document.body.classList.contains('dark-mode')) {
                themeToggle.textContent = '☀️';
            } else {
                themeToggle.textContent = '🌙';
            }
        });
    </script>
</body>
</html>
