<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ recipe.name }} - Recipe Detail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">
      <i class="bi bi-robot text-primary"></i> <span class="gradient-text">AI Food Tracker</span>
    </a>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-primary btn-sm" href="/recipes"><i class="bi bi-arrow-left"></i> Back</a>
      <a class="btn btn-custom btn-sm" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>
    </div>
  </div>
</nav>
<div class="container">
  <div class="glass-card p-4">
    <div class="d-flex justify-content-between align-items-start">
      <div>
        <h2 class="fw-bold">{{ recipe.name }}</h2>
        <p class="text-secondary mb-2">Detailed recipe and ingredient breakdown.</p>
      </div>
      <span class="badge bg-success">Recommended</span>
    </div>
    <div class="mb-3">
      <h5 class="fw-semibold">Ingredients</h5>
      <ul>
        {% for ingredient in recipe.ingredients %}
          <li>{{ ingredient }}</li>
        {% endfor %}
      </ul>
    </div>
    <div>
      <h5 class="fw-semibold">Steps</h5>
      <p>{{ recipe.steps }}</p>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
